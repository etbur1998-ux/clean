services:
  # ── .NET Web Application ─────────────────────────────────────────────────
  - type: web
    name: yeka-cleaning-web
    runtime: docker
    dockerfilePath: ./CleaningManagmentSystem/Dockerfile
    dockerContext: ./CleaningManagmentSystem
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DB_HOST
        value: mysql-2bfe5358-yekaclean.g.aivencloud.com
      - key: DB_PORT
        value: "17665"
      - key: DB_NAME
        value: defaultdb
      - key: DB_USER
        value: avnadmin
      - key: DB_PASSWORD
        sync: false  # set manually in Render dashboard with your Aiven password
